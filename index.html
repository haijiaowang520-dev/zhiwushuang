<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>微信放岗文本生成器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c-primary: #1a1a2e;
      --c-accent: #e94560;
      --c-gold: #f4a261;
      --c-green: #2a9d8f;
      --c-bg: #f0f2f5;
      --c-card: #ffffff;
      --c-text: #2d3436;
      --c-text-light: #636e72;
      --c-border: #e9ecef;
      --c-input-bg: #f8f9fa;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .app-container {
      max-width: 100%;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== 顶部导航 ===== */
    .nav-bar {
      background: linear-gradient(135deg, var(--c-primary) 0%, #16213e 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(26,26,46,0.3);
    }

    .nav-title {
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
    }

    .brand-emoji {
      font-size: 20px;
      margin-right: 10px;
      filter: drop-shadow(0 2px 3px rgba(244,162,97,0.3));
    }

    .brand-text {
      color: var(--c-gold);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-right: 4px;
    }

    .brand-dot {
      color: var(--c-gold);
      font-weight: 900;
      margin-right: 8px;
      font-size: 20px;
    }

    .nav-sub {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 500;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      padding: 8px 16px;
      border-radius: 50px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      -webkit-appearance: none;
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--c-accent) 0%, #c73e54 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(233,69,96,0.4);
    }

    .nav-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* ===== Tab 切换 ===== */
    .tab-bar {
      display: flex;
      background: var(--c-card);
      border-bottom: 1px solid var(--c-border);
      position: sticky;
      top: 60px;
      z-index: 99;
    }

    .tab-item {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--c-text-light);
      cursor: pointer;
      position: relative;
      transition: all 0.3s;
    }

    .tab-item.active {
      color: var(--c-accent);
    }

    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: linear-gradient(90deg, var(--c-accent), #c73e54);
      border-radius: 3px 3px 0 0;
    }

    /* ===== 内容区域 ===== */
    .content-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== 输入表单区域 ===== */
    .form-panel {
      padding: 16px;
      display: none;
    }

    .form-panel.active { display: block; }

    .form-section {
      background: var(--c-card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--c-border);
    }

    .form-section-title {
      font-size: 15px;
      font-weight: 900;
      color: var(--c-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--c-border);
    }

    .form-section-title .icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--c-primary) 0%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 6px;
    }

    .form-label .required {
      color: var(--c-accent);
      margin-left: 2px;
    }

    .form-input, .form-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--c-border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--c-input-bg);
      color: var(--c-text);
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--c-accent);
      background: #fff;
    }

    .form-textarea {
      min-height: 80px;
      resize: vertical;
    }

    /* 动态列表输入（统一样式） */
    .dynamic-inputs {
      display: grid;
      gap: 12px;
    }

    .dynamic-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dynamic-row .form-input {
      flex: 1;
    }

    .dynamic-row .form-input.small {
      flex: 0 0 80px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-appearance: none;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--c-border);
      border-radius: 12px;
      background: transparent;
      color: var(--c-text-light);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .add-btn:active {
      border-color: var(--c-accent);
      color: var(--c-accent);
    }

    /* 薪资档位特殊样式 */
    .salary-row {
      background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid var(--c-gold);
      position: relative;
    }

    .salary-row-title-input {
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 700;
      color: var(--c-gold);
      width: 100%;
      margin-bottom: 10px;
      font-family: inherit;
      border-bottom: 1px dashed var(--c-gold);
      padding-bottom: 4px;
    }

    .salary-row-title-input:focus {
      outline: none;
      border-bottom: 2px solid var(--c-gold);
    }

    .salary-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .salary-fields .form-input {
      background: #fff;
    }

    .salary-fields .form-input.full {
      grid-column: 1 / -1;
    }

    .salary-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-appearance: none;
    }

    /* ===== 预览区域 ===== */
    .preview-panel {
      display: none;
      padding: 16px;
    }

    .preview-panel.active { display: block; }

    .preview-wechat {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .preview-label {
      font-size: 12px;
      color: var(--c-text-light);
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 2px;
    }

    .preview-text-box {
      background: #f7f7f7;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 200px;
      border: 1px solid #e0e0e0;
    }

    /* ===== 结果区域 ===== */
    .result-panel {
      display: none;
      padding: 16px;
    }

    .result-panel.active { display: block; }

    .result-actions {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .action-btn {
      padding: 16px 24px;
      border-radius: 16px;
      border: none;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-appearance: none;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, var(--c-accent) 0%, #c73e54 100%);
      color: #fff;
      box-shadow: 0 8px 25px rgba(233,69,96,0.4);
    }

    .action-btn.secondary {
      background: var(--c-card);
      color: var(--c-primary);
      border: 2px solid var(--c-border);
    }

    .result-text-box {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      border: 1px solid var(--c-border);
    }

    /* ===== 提示弹窗 ===== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 顶部导航 -->
    <div class="nav-bar">
      <div>
        <div class="nav-title"><span class="brand-emoji">🏆</span><span class="brand-text">职无双</span><span class="brand-dot">·</span>微信放岗文本生成器</div>
        <div class="nav-sub">填信息 → 自动生成 → 复制发群</div>
      </div>
      <div class="nav-actions">
        <button class="nav-btn secondary" onclick="resetForm()">🔄 重置</button>
        <button class="nav-btn primary" onclick="generateText()">✨ 生成</button>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('form')" data-tab="form">📝 填写信息</div>
      <div class="tab-item" onclick="switchTab('preview')" data-tab="preview">👁️ 实时预览</div>
      <div class="tab-item" onclick="switchTab('result')" data-tab="result">📋 生成结果</div>
    </div>

    <!-- 内容区域 -->
    <div class="content-area">
      <!-- 表单面板 -->
      <div class="form-panel active" id="formPanel">

        <!-- 企业信息 -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">🏭</div>
            <span>企业信息</span>
          </div>
          <div class="form-group">
            <label class="form-label">企业名称<span class="required">*</span></label>
            <input type="text" class="form-input" id="companyName" placeholder="例如：中源汽车" value="中源汽车">
          </div>
        </div>

        <!-- 返费政策（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">💥</div>
            <span>返费政策</span>
          </div>
          <div class="dynamic-inputs" id="rebateInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="例如：男女满10天返1000元｜到期当天兑现" value="男女满10天返1000元｜到期当天兑现">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'rebate')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addRebate()">+ 添加返费政策</button>
        </div>

        <!-- 薪资结算方式（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">🧧</div>
            <span>薪资结算方式</span>
          </div>
          <div class="dynamic-inputs" id="settlementInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="例如：压5天工资，之后每日日结" value="压5天工资，之后每日日结">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'settlement')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addSettlement()">+ 添加结算方式</button>
        </div>

        <!-- 在招岗位（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">📋</div>
            <span>在招岗位</span>
          </div>
          <div class="dynamic-inputs" id="jobInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="岗位名称" value="操作工">
              <input type="text" class="form-input" placeholder="要求（如：男女均可）" value="男女均可">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'job')">×</button>
            </div>
            <div class="dynamic-row" data-index="1">
              <input type="text" class="form-input" placeholder="岗位名称" value="叉车司机">
              <input type="text" class="form-input" placeholder="要求" value="男，持叉车证">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'job')">×</button>
            </div>
            <div class="dynamic-row" data-index="2">
              <input type="text" class="form-input" placeholder="岗位名称" value="二氧焊工">
              <input type="text" class="form-input" placeholder="要求" value="男，持焊工证">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'job')">×</button>
            </div>
            <div class="dynamic-row" data-index="3">
              <input type="text" class="form-input" placeholder="岗位名称" value="巡检检查工">
              <input type="text" class="form-input" placeholder="要求" value="男">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'job')">×</button>
            </div>
            <div class="dynamic-row" data-index="4">
              <input type="text" class="form-input" placeholder="岗位名称" value="发货员">
              <input type="text" class="form-input" placeholder="要求" value="男，持叉车证">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'job')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addJob()">+ 添加岗位</button>
        </div>

        <!-- 上班详情 - 班次安排（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">⏰</div>
            <span>上班详情 - 班次安排</span>
          </div>
          <div class="dynamic-inputs" id="shiftInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="例如：12小时两班倒，每日倒班补贴10元" value="12小时两班倒，每日倒班补贴10元">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'shift')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addShift()">+ 添加班次</button>

          <div class="form-group" style="margin-top: 16px;">
            <label class="form-label">年龄要求</label>
            <input type="text" class="form-input" id="ageRequirement" placeholder="例如：男20-45周岁｜女35-45周岁" value="男20-45周岁｜女35-45周岁">
          </div>
        </div>

        <!-- 薪资标准（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">💸</div>
            <span>薪资标准</span>
          </div>
          <div class="dynamic-inputs" id="salaryInputs">
            <div class="salary-row" data-index="0">
              <button class="salary-delete-btn" onclick="removeSalaryRow(this)">×</button>
              <input type="text" class="salary-row-title-input" placeholder="档位名称" value="普通岗位">
              <div class="salary-fields">
                <input type="text" class="form-input" placeholder="平日时薪" value="平日18元/时">
                <input type="text" class="form-input" placeholder="周末时薪" value="周末20元/时">
                <input type="text" class="form-input full" placeholder="综合月薪" value="综合6500元左右">
              </div>
            </div>
            <div class="salary-row" data-index="1">
              <button class="salary-delete-btn" onclick="removeSalaryRow(this)">×</button>
              <input type="text" class="salary-row-title-input" placeholder="档位名称" value="持证焊工">
              <div class="salary-fields">
                <input type="text" class="form-input" placeholder="平日时薪" value="平日23元/时">
                <input type="text" class="form-input" placeholder="周末时薪" value="周末25元/时">
                <input type="text" class="form-input full" placeholder="综合月薪" value="综合8000元左右">
              </div>
            </div>
          </div>
          <button class="add-btn" onclick="addSalary()">+ 添加薪资档位</button>
        </div>

        <!-- 厂区福利（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">🏠</div>
            <span>厂区福利</span>
          </div>
          <div class="dynamic-inputs" id="benefitInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="例如：包吃包住，食宿环境佳" value="包吃包住，食宿环境佳">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'benefit')">×</button>
            </div>
            <div class="dynamic-row" data-index="1">
              <input type="text" class="form-input" placeholder="例如：工作轻松自在，表现优秀半年可转正" value="工作轻松自在，表现优秀半年可转正">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'benefit')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addBenefit()">+ 添加福利</button>
        </div>

                <!-- 厂区地址（动态增删） -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">📍</div>
            <span>厂区地址</span>
          </div>
          <div class="dynamic-inputs" id="addressInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="例如：沈阳市铁西区xxx路xxx号" value="">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'address')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addAddress()">+ 添加地址</button>
        </div>

        <!-- 面试提醒 -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">⚠️</div>
            <span>面试提醒</span>
          </div>
          <div class="dynamic-inputs" id="reminderInputs">
            <div class="dynamic-row" data-index="0">
              <input type="text" class="form-input" placeholder="例如：禁止穿短裤、拖鞋、裙子到场面试" value="禁止穿短裤、拖鞋、裙子到场面试">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'reminder')">×</button>
            </div>
            <div class="dynamic-row" data-index="1">
              <input type="text" class="form-input" placeholder="例如：请着装整洁，携带身份证原件" value="请着装整洁，携带身份证原件">
              <button class="btn-icon" onclick="removeDynamicRow(this, 'reminder')">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addReminder()">+ 添加提醒</button>
        </div>

        <!-- 联系方式 -->
        <div class="form-section">
          <div class="form-section-title">
            <div class="icon">📞</div>
            <span>联系方式</span>
          </div>
          <div class="form-group">
            <label class="form-label">报名电话<span class="required">*</span></label>
            <input type="tel" class="form-input" id="phoneNumber" placeholder="例如：18904087429" value="18904087429">
          </div>
          <div class="form-group">
            <label class="form-label">接送信息</label>
            <input type="text" class="form-input" id="shuttleInfo" placeholder="例如：周一至周五中午1点统一免费保送" value="周一至周五中午1点统一免费保送">
          </div>
        </div>

        <div style="height: 40px;"></div>
      </div>

      <!-- 预览面板 -->
      <div class="preview-panel" id="previewPanel">
        <div class="preview-wechat">
          <div class="preview-label">👇 微信聊天框预览效果</div>
          <div class="preview-text-box" id="previewText">点击「✨ 生成」查看预览</div>
        </div>
      </div>

      <!-- 结果面板 -->
      <div class="result-panel" id="resultPanel">
        <div class="result-actions">
          <button class="action-btn primary" onclick="copyText()">📋 一键复制文本</button>
          <button class="action-btn secondary" onclick="switchTab('form')">✏️ 返回修改</button>
        </div>
        <div class="result-text-box" id="resultText"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ===== 计数器 =====
    let counters = {
      rebate: 1,
      settlement: 1,
      job: 5,
      shift: 1,
      salary: 2,
      benefit: 2,
      address: 1,
      reminder: 2
    };

    // ===== 通用删除函数 =====
    function removeDynamicRow(btn, type) {
      const container = document.getElementById(type + 'Inputs');
      const rows = container.querySelectorAll('.dynamic-row');
      if (rows.length <= 1) {
        showToast('至少保留一条');
        return;
      }
      btn.parentElement.remove();
    }

    // ===== 返费政策增删 =====
    function addRebate() {
      const container = document.getElementById('rebateInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.rebate++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="例如：男女满10天返1000元｜到期当天兑现">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'rebate')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== 结算方式增删 =====
    function addSettlement() {
      const container = document.getElementById('settlementInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.settlement++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="例如：压5天工资，之后每日日结">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'settlement')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== 岗位增删 =====
    function addJob() {
      const container = document.getElementById('jobInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.job++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="岗位名称">
        <input type="text" class="form-input" placeholder="要求（如：男女均可）">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'job')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== 班次增删 =====
    function addShift() {
      const container = document.getElementById('shiftInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.shift++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="例如：12小时两班倒，每日倒班补贴10元">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'shift')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== 薪资档位增删 =====
    function addSalary() {
      const container = document.getElementById('salaryInputs');
      const row = document.createElement('div');
      row.className = 'salary-row';
      row.dataset.index = counters.salary++;
      row.innerHTML = `
        <button class="salary-delete-btn" onclick="removeSalaryRow(this)">×</button>
        <input type="text" class="salary-row-title-input" placeholder="档位名称">
        <div class="salary-fields">
          <input type="text" class="form-input" placeholder="平日时薪">
          <input type="text" class="form-input" placeholder="周末时薪">
          <input type="text" class="form-input full" placeholder="综合月薪">
        </div>
      `;
      container.appendChild(row);
    }

    function removeSalaryRow(btn) {
      const container = document.getElementById('salaryInputs');
      const rows = container.querySelectorAll('.salary-row');
      if (rows.length <= 1) {
        showToast('至少保留一个档位');
        return;
      }
      btn.parentElement.remove();
    }

    // ===== 地址增删 =====
    function addAddress() {
      const container = document.getElementById('addressInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.address++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="例如：沈阳市铁西区xxx路xxx号">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'address')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== 福利增删 =====
    function addBenefit() {
      const container = document.getElementById('benefitInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.benefit++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="例如：包吃包住，食宿环境佳">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'benefit')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== 提醒增删 =====
    function addReminder() {
      const container = document.getElementById('reminderInputs');
      const row = document.createElement('div');
      row.className = 'dynamic-row';
      row.dataset.index = counters.reminder++;
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="例如：禁止穿短裤、拖鞋、裙子到场面试">
        <button class="btn-icon" onclick="removeDynamicRow(this, 'reminder')">×</button>
      `;
      container.appendChild(row);
    }

    // ===== Tab 切换 =====
    function switchTab(tab) {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel, .preview-panel, .result-panel').forEach(p => p.classList.remove('active'));

      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(tab + 'Panel').classList.add('active');

      if (tab === 'preview') {
        updatePreview();
      }
    }

    // ===== 生成文本 =====
    let generatedText = '';

    function generateText() {
      generatedText = buildText();

      // 切换到结果面板
      switchTab('result');
      document.getElementById('resultText').textContent = generatedText;

      showToast('✅ 生成成功！点击「一键复制」');
    }

    function updatePreview() {
      const text = buildText();
      document.getElementById('previewText').textContent = text;
    }

    // 辅助函数：检查值是否有效
    function isValid(val) {
      return val && val.trim() !== '';
    }

    function buildText() {
      const company = document.getElementById('companyName').value || '';
      const age = document.getElementById('ageRequirement').value || '';
      const phone = document.getElementById('phoneNumber').value || '';
      const shuttle = document.getElementById('shuttleInfo').value || '';

      let text = '';

      // 企业名称（必填）
      if (isValid(company)) {
        text += `🏭${company}\n`;
        text += `══════════\n`;
      }

      // 返费政策（动态，只生成已填写的）
      const rebateRows = document.querySelectorAll('#rebateInputs .dynamic-row');
      let hasRebate = false;
      rebateRows.forEach(row => {
        const val = row.querySelector('input').value;
        if (isValid(val)) {
          if (!hasRebate) hasRebate = true;
          text += `💥返费标准｜${val}\n`;
        }
      });

      // 结算方式（动态，只生成已填写的）
      const settlementRows = document.querySelectorAll('#settlementInputs .dynamic-row');
      let hasSettlement = false;
      settlementRows.forEach(row => {
        const val = row.querySelector('input').value;
        if (isValid(val)) {
          if (!hasSettlement) hasSettlement = true;
          text += `🧧薪资结算｜${val}\n`;
        }
      });

      // 如果有返费或结算，加分隔线
      if (hasRebate || hasSettlement) {
        text += `══════════\n`;
      }

      // 在招岗位（动态，只生成已填写的）
      const jobRows = document.querySelectorAll('#jobInputs .dynamic-row');
      const jobEmojis = ['👫','🚜','🔥','🔍','📦','🔧','⚡','🎯','🛠️','📊'];
      let hasJob = false;
      let jobText = '';
      jobRows.forEach((row, i) => {
        const inputs = row.querySelectorAll('input');
        const name = inputs[0].value;
        const req = inputs[1].value;
        if (isValid(name)) {
          if (!hasJob) hasJob = true;
          const emoji = jobEmojis[i % jobEmojis.length];
          jobText += `${emoji}${name}（${req}）\n`;
        }
      });
      if (hasJob) {
        text += `📋在招岗位\n`;
        text += jobText;
        text += `══════════\n`;
      }

      // 上班详情（动态班次 + 年龄）
      const shiftRows = document.querySelectorAll('#shiftInputs .dynamic-row');
      let hasShift = false;
      let shiftText = '';
      shiftRows.forEach(row => {
        const val = row.querySelector('input').value;
        if (isValid(val)) {
          if (!hasShift) hasShift = true;
          shiftText += `🔄${val}\n`;
        }
      });

      if (hasShift || isValid(age)) {
        text += `⏰上班详情\n`;
        text += shiftText;
        if (isValid(age)) {
          text += `👤年龄：${age}\n`;
        }
        text += `══════════\n`;
      }

      // 薪资标准（动态，只生成已填写的）
      const salaryRows = document.querySelectorAll('#salaryInputs .salary-row');
      let hasSalary = false;
      let salaryText = '';
      salaryRows.forEach(row => {
        const titleInput = row.querySelector('.salary-row-title-input');
        const title = titleInput ? titleInput.value : '';
        const inputs = row.querySelectorAll('.salary-fields input');
        const weekday = inputs[0] ? inputs[0].value : '';
        const weekend = inputs[1] ? inputs[1].value : '';
        const total = inputs[2] ? inputs[2].value : '';

        // 只要有标题或任意一个薪资字段填写了，就生成
        if (isValid(title) || isValid(weekday) || isValid(weekend) || isValid(total)) {
          if (!hasSalary) hasSalary = true;
          const displayTitle = isValid(title) ? title : '岗位';
          const displayWeekday = isValid(weekday) ? weekday : '';
          const displayWeekend = isValid(weekend) ? '｜' + weekend : '';
          const displayTotal = isValid(total) ? '，' + total : '';
          salaryText += `▫${displayTitle}：${displayWeekday}${displayWeekend}${displayTotal}\n`;
        }
      });
      if (hasSalary) {
        text += `💸薪资标准\n`;
        text += salaryText;
        text += `══════════\n`;
      }

      // 厂区福利（动态，只生成已填写的）
      const benefitRows = document.querySelectorAll('#benefitInputs .dynamic-row');
      let hasBenefit = false;
      let benefitText = '';
      benefitRows.forEach(row => {
        const val = row.querySelector('input').value;
        if (isValid(val)) {
          if (!hasBenefit) hasBenefit = true;
          benefitText += `✅${val}\n`;
        }
      });
      if (hasBenefit) {
        text += `🏠厂区福利\n`;
        text += benefitText;
        text += `══════════\n`;
      }

      // 厂区地址（动态，只生成已填写的）
      const addressRows = document.querySelectorAll('#addressInputs .dynamic-row');
      let hasAddress = false;
      let addressText = '';
      const addressEmojis = ['📍','🏢','🚇','🚌','🚗'];
      addressRows.forEach((row, i) => {
        const val = row.querySelector('input').value;
        if (isValid(val)) {
          if (!hasAddress) hasAddress = true;
          const emoji = addressEmojis[i % addressEmojis.length];
          addressText += `${emoji}${val}\n`;
        }
      });
      if (hasAddress) {
        text += `📍厂区地址\n`;
        text += addressText;
        text += `══════════\n`;
      }

      // 面试提醒（动态，只生成已填写的）
      const reminderRows = document.querySelectorAll('#reminderInputs .dynamic-row');
      let hasReminder = false;
      let reminderText = '';
      reminderRows.forEach(row => {
        const val = row.querySelector('input').value;
        if (isValid(val)) {
          if (!hasReminder) hasReminder = true;
          reminderText += `${val}\n`;
        }
      });
      if (hasReminder) {
        text += `⚠️面试着装提醒\n`;
        text += reminderText;
        text += `══════════\n`;
      }

      // 联系方式（只生成已填写的）
      if (isValid(shuttle)) {
        text += `🚌接送：${shuttle}\n`;
      }
      if (isValid(phone)) {
        text += `📞报名热线：${phone}`;
      }

      return text;
    }

    // ===== 复制功能 =====
    function copyText() {
      if (!generatedText) { showToast('请先生成文本'); return; }

      navigator.clipboard.writeText(generatedText).then(() => {
        showToast('📋 已复制！去微信群粘贴吧');
      }).catch(() => {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = generatedText;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('📋 已复制！去微信群粘贴吧');
      });
    }

    // ===== 重置表单 =====
    function resetForm() {
      if (!confirm('确定要重置所有内容吗？')) return;

      // 重置所有输入
      document.querySelectorAll('.form-input, .salary-row-title-input').forEach(input => {
        input.value = '';
      });

      // 重置企业名称和电话的默认值
      document.getElementById('companyName').value = '';
      document.getElementById('phoneNumber').value = '';
      document.getElementById('ageRequirement').value = '';
      document.getElementById('shuttleInfo').value = '';

      // 保留每类至少一条，删除多余的
      const types = ['rebate', 'settlement', 'job', 'shift', 'benefit', 'reminder'];
      types.forEach(type => {
        const container = document.getElementById(type + 'Inputs');
        const rows = container.querySelectorAll('.dynamic-row');
        for (let i = 1; i < rows.length; i++) rows[i].remove();
      });

      // 薪资保留一个
      const salaryContainer = document.getElementById('salaryInputs');
      const salaryRows = salaryContainer.querySelectorAll('.salary-row');
      for (let i = 1; i < salaryRows.length; i++) salaryRows[i].remove();

      // 重置计数器
      counters = { rebate: 1, settlement: 1, job: 1, shift: 1, salary: 1, benefit: 1, reminder: 1 };

      showToast('✅ 已重置');
    }

    // ===== Toast 提示 =====
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 初始化预览
    updatePreview();
  </script>
</body>
</html>
